<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <title>Commissions</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Commission me for a frontend project" />
  <link href="https://cdn.jsdelivr.net/npm/modern-normalize@v3.0.1/modern-normalize.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="css/commissions.css" />
  <link rel="icon" href="assets/logo2.ico">
</head>

<body>
    <h1>Commissions</h1>
    <form action="https://formsubmit.co/chrisabreurgs@gmail.com" method="POST" id="commission-form">
      <p>Christopher Abreu, Frontend developer, currently taking commissions. Refer <a href="index.html" target="_blank">here</a> for more information.</p>
      <fieldset>
        <legend>Contact Information</legend>
        <div class="section">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
          <div class="sameline">
            <label for="method"><span class="phoneNotVisible">Preferred</span> Contact Method: </label>
            <select id="method" name="contact" required>
              <option value="" selected disabled>Select contact method</option>
              <option value="email">Email</option>
              <option value="discord">Discord</option>
              <option value="phone">Text Message</option>
              <option value="other">Other</option>
            </select>
          </div>
          <label for="contactInfo" id="contactLabel">Email:</label>
          <input type="email" id="contactInfo" name="contactInfo" placeholder="your@email.com" required>
          <label for="company">Company (Optional):</label>
          <input type="text" id="company" name="company">
        </div>
      </fieldset>
      <fieldset>
        <legend>Project Information</legend>
        <div class="section">
          <label for="project">Project Type: </label>
          <select id="project" name="project" autocomplete="name" required>
            <option value="" selected disabled>Select project</option>
            <option value="webdev">Web Development</option>
            <option value="webapp">Web Application</option>
            <option value="bugfix">Bug Fix / Maintenance</option>
            <option value="ui">UI / UX Design</option>
            <option value="automation">Automation Script</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="section">
          <label for="information">Project Description</label>
          <textarea required rows="5" id="information" name="information" placeholder="Describe your project, goals, requirements, references, etc."></textarea>
          <label for="assets">Link any existing Assets: 
            <input type="text" name="assets" id="assets" placeholder="e.g. designs, website link, mockups, etc">
          </label>
        </div>
        <div class="grid">
          <fieldset id="budgetline">
            <legend>Budget <span class="phoneNotVisible">Range: </span></legend>
            <div class="section" id="budget">
              <div class="responsiveRadio">
                <label for="hundred">Under $100</label>
                <input type="radio" id="hundred" value="0-100" name="budget" required>
              </div>
              <div class="responsiveRadio">
                <label for="fivehundred">$100-$500</label>
                <input type="radio" id="fivehundred" value="100-500" name="budget">
              </div>
              <div class="responsiveRadio">
                <label for="thousand">$500-$1000</label>
                <input type="radio" id="thousand" value="500-1000" name="budget">
              </div>
              <div class="responsiveRadio">
                <label for="thousandPlus">$1000+</label>
                <input type="radio" id="thousandPlus" value="1000+" name="budget">
              </div>
              <div class="responsiveRadio">
                <label for="notsure">Not Sure</label>
                <input type="radio" id="notsure" value="notsure" name="budget">
              </div>
            </div>
          </fieldset>
          <fieldset id="timelineline">
            <legend>Timeline: </legend>
            <div class="section" id="timeline">
              <div class="responsiveRadio">
                <label for="asap">ASAP</label>
                <input type="radio" id="asap" value="asap" name="timeline" required>
              </div>
              <div class="responsiveRadio">
                <label for="week">Within 1 week</label>
                <input type="radio" id="week" value="week" name="timeline">
              </div>
              <div class="responsiveRadio">
                <label for="month">Within 1 month</label>
                  <input type="radio" id="month" value="month" name="timeline">
              </div>
              <div class="responsiveRadio">
                <label for="flexible">Flexible</label>
                <input type="radio" id="flexible" value="flexible" name="timeline">
              </div>
            </div>
          </fieldset>
        </div>
      </fieldset>
      <button type="submit">Submit</button>
      <p id="disclaimer">*Submitting this form does not guarantee acceptance of the project.</p>
    </form>
  <script src="js/commissions.js"></script>
</body>
</html>
